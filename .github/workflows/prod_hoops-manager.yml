name: Build and deploy PHP app to Azure Web App - hoops-manager

on:
  push:
    branches:
      - prod
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          extensions: mbstring, bcmath, gd, zip # Common Laravel requirements

      - name: Install Composer Dependencies
        run: |
          composer install --optimize-autoloader --no-dev --prefer-dist --no-progress

      # IMPORTANT: If you use Vite/Tailwind (Standard in modern Laravel)
      - name: Install NPM dependencies and build assets
        run: |
          npm install
          npm run build

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: php-app
          path: .

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: php-app
      
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_0448892A009842C489E9A5867A8DF018 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_4CDC4478BD8346EABD9FF55E73A27202 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_DA05E33B7F5448FA8818BDC65B097235 }}

      - name: 'Deploy to Azure Web App'
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'hoops-manager'
          slot-name: 'Production'
          package: .